name: Gitleaks Secret Scan (Reusable)

on:
  workflow_call:
    inputs:
      config-path:
        description: "Relative path to a .gitleaks.toml in the calling repo (optional)"
        type: string
        required: false
        default: ""
      fail-on-leak:
        description: "Exit with error if leaks found (set false to warn-only)"
        type: boolean
        required: false
        default: true

jobs:
  gitleaks:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VER=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name"' | cut -d'"' -f4)
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER#v}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          echo "Installed $(gitleaks version)"

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: ${{ !inputs.fail-on-leak }}
        run: |
          ARGS="detect --redact --verbose"
          if [ -n "${{ inputs.config-path }}" ]; then
            ARGS="$ARGS --config=${{ inputs.config-path }}"
          fi
          gitleaks $ARGS

      - name: Annotate PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🚨 **Gitleaks detected potential secrets in this PR.** Please review the Actions log, rotate any exposed credentials, and rewrite git history if needed before merging."
            })
